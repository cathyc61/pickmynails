<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick My Nails! 💅</title>
    <style>
        :root {
            --primary-color: #ff8fab;
            --bg-color: #ffe5ec;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            color: #fb6f92;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1.1rem;
            color: #555;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            max-width: 900px;
            width: 100%;
            margin-bottom: 2rem;
        }

        .nail-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border 0.3s ease;
            border: 4px solid transparent;
            position: relative;
        }

        .nail-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(251, 111, 146, 0.3);
        }

        .nail-card.selected {
            border-color: var(--primary-color);
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(251, 111, 146, 0.5);
        }

        .nail-card.selected::after {
            content: '💙';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.5rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }

        .nail-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .nail-title {
            padding: 1rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #fb6f92;
        }

        .confirm-btn {
            background-color: #fb6f92;
            color: white;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(251, 111, 146, 0.4);
            margin-bottom: 3rem;
        }

        .confirm-btn:hover {
            background-color: #ff8fab;
            transform: scale(1.05);
        }

        .confirm-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-content h2 {
            color: #fb6f92;
            margin-bottom: 1rem;
        }

        .modal-content p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .send-btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            transition: transform 0.2s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .wa-btn {
            background-color: #25D366 /*#ff1493 hot pink*/;
        }

        .close-btn {
            background-color: #ff8fab;
            color: #fff;
            border: 1px solid #ff8fab;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background-color: #fb6f92 /*#f5f5f5*/;
            color: #fff;
        }

        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
            .nail-image {
                height: 180px;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>It's Time to Pick My Nails! 😘</h1>
        <p>Choose your favorite one for my appointment tmr.</p>
    </header>

    <div class="gallery">
        <div class="nail-card" data-style="Pink & Purple Cat Eye">
            <img src="https://i.imgur.com/rYSJg0d.jpeg" alt="Nail Style 1" class="nail-image">
            <div class="nail-title">Pink & Purple Cat Eye</div>
        </div>

        <div class="nail-card" data-style="Chrome Blush">
            <img src="https://i.imgur.com/6tM1w53.jpeg" alt="Nail Style 2" class="nail-image">
            <div class="nail-title">Chrome Blush</div>
        </div>

        <div class="nail-card" data-style="Pink & White with Flowers on Top">
            <img src="https://i.imgur.com/QfTLCYv.jpeg" alt="Nail Style 3" class="nail-image">
            <div class="nail-title">Pink & White with Flowers on Top</div>
        </div>

        <div class="nail-card" data-style="Purple & White with Glitter">
            <img src="https://i.imgur.com/YeVIr5e.jpeg" alt="Nail Style 4" class="nail-image">
            <div class="nail-title">Purple & White with Glitter</div>
        </div>

        <div class="nail-card" data-style="Pink Cat Eye & French">
            <img src="https://i.imgur.com/SZijT0P.jpeg" alt="Nail Style 5" class="nail-image">
            <div class="nail-title">Pink Cat Eye & French</div>
        </div>

        <div class="nail-card" data-style="Pink Cat Eye & White French">
            <img src="https://i.imgur.com/Jc1p5b1.jpeg" alt="Nail Style 6" class="nail-image">
            <div class="nail-title">Pink Cat Eye & White French</div>
        </div>
    </div>

    <button class="confirm-btn" id="confirmBtn" disabled>Pick one first!</button>

    <!-- Success Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2>Your Pick 💙</h2>
            <p>You selected <strong id="selectedStyleName"></strong>.</p>
            <p>Must be a nice one! 😈</p>
            
            <div class="action-buttons">
                <a href="#" id="waLink" class="send-btn wa-btn">Let Me Know:)</a>
            </div>

            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        const cards = document.querySelectorAll('.nail-card');
        const confirmBtn = document.getElementById('confirmBtn');
        const modal = document.getElementById('modal');
        const selectedStyleText = document.getElementById('selectedStyleName');
        const waLink = document.getElementById('waLink');
        
        let selectedStyle = null;

        // Add click event to each card
        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedStyle = card.getAttribute('data-style');
                
                confirmBtn.disabled = false;
                confirmBtn.innerText = "Confirm Choice 💅";
            });
        });

        // Handle confirm button click
        confirmBtn.addEventListener('click', () => {
            if (selectedStyle) {
                // Update text in modal
                selectedStyleText.innerText = selectedStyle;
                
                // Create the pre-written message
                const message = `${selectedStyle}`;
                
                // Encode the message so it works in a URL
                const encodedMessage = encodeURIComponent(message);
                
                // Set up the links for SMS and WhatsApp
                waLink.href = `https://api.whatsapp.com/send?phone=85260805756&text=${encodedMessage}!This%20%F0%9F%91%8D%F0%9F%8F%BD`;

                // Show Modal
                modal.classList.add('active');
            }
        });

        // Function to close the modal
        function closeModal() {
            modal.classList.remove('active');
            
            // Reset selection after closing
            cards.forEach(c => c.classList.remove('selected'));
            selectedStyle = null;
            confirmBtn.disabled = true;
            confirmBtn.innerText = "Pick one first!";
        }
    </script>
</body>
</html>
